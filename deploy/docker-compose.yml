# M-Engine — orquestração local/produção via Docker Compose.
#
# Serviços:
#   redis   — broker/result-backend do Celery
#   api     — FastAPI (uvicorn m_engine.api:app)
#   worker  — Celery (celery -A m_engine.tasks worker)
#
# Uso:
#   1) cp .env.example .env  &&  preencha as chaves (NÃO comitar .env)
#   2) export M_BASE=/caminho/no/host/para/dados   (volume de PHI, idealmente cifrado)
#   3) docker compose -f deploy/docker-compose.yml up -d --build
#
# Build context é a raiz do projeto (onde estão pyproject.toml e m_engine/).

services:
  redis:
    image: redis:7-alpine
    restart: always
    # Persistência mínima do broker; dados de fila não são PHI, mas evitamos
    # expor a porta para fora da rede do compose.
    command: ["redis-server", "--save", "60", "1", "--appendonly", "no"]
    volumes:
      - redis-data:/data
    networks:
      - m-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    restart: always
    # Lê todas as variáveis (chaves de provider, REDIS_URL, etc.) de .env.
    env_file:
      - ../.env
    environment:
      # Dentro da rede do compose o Redis é alcançável pelo nome do serviço.
      REDIS_URL: redis://redis:6379/0
      M_BASE: /var/lib/m-engine
    volumes:
      # Volume de dados clínicos (PHI). ${M_BASE} no host -> /var/lib/m-engine no container.
      - ${M_BASE:-./_data}:/var/lib/m-engine
    ports:
      - "${M_API_PORT:-8000}:8000"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - m-net
    command: >
      sh -c "uvicorn m_engine.api:app --host 0.0.0.0 --port 8000"

  worker:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    restart: always
    env_file:
      - ../.env
    environment:
      REDIS_URL: redis://redis:6379/0
      M_BASE: /var/lib/m-engine
    volumes:
      # MESMO volume da API: stages leem/escrevem o dossiê do paciente.
      - ${M_BASE:-./_data}:/var/lib/m-engine
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - m-net
    # Sem healthcheck HTTP (worker não expõe porta); o Celery cuida do liveness.
    command: >
      celery -A m_engine.tasks worker --loglevel=info --concurrency=2

networks:
  m-net:
    driver: bridge

volumes:
  redis-data:
